name: Publish to npm

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Automatic trigger when a version tag is pushed (e.g. v0.1.0).
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # Required for npm trusted publishing (OIDC): the token is exchanged at
  # publish time, so no long-lived NPM_TOKEN secret is needed.
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      # Never publish a broken build.
      - run: npm run lint
      - run: npm run prettier-check
      - run: npm run check-types
      - run: npm run coverage

      # Whenever this runs on a tag (pushed, or dispatched on a tag by the
      # release workflow), make sure the tag matches the package.json version
      # (e.g. tag v0.1.0 <-> "version": "0.1.0"), so a mistyped tag can never
      # publish the wrong version.
      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # No token: authentication and provenance are handled automatically by
      # npm trusted publishing via the OIDC id-token above.
      - name: Publish
        run: npm publish
